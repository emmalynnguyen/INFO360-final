<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SmartLearn (Interactive Prototype)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="SmartLearn prototype">
      <section class="phone" role="application" aria-label="SmartLearn phone UI">
        <header class="statusbar" aria-hidden="true">
          <div class="status-left"></div>
          <div class="status-center"></div>
          <div class="status-right">
            <span class="sb-dot"></span>
            <span class="sb-dot"></span>
            <span class="sb-dot"></span>
          </div>
        </header>

        <header class="topbar" id="topbar">
          <button class="iconbtn" id="btnBack" type="button" aria-label="Back">
            <span aria-hidden="true">&lt;</span>
          </button>
          <div class="topbar-title">
            <div class="crumb" id="crumb"></div>
            <h1 id="title">SmartLearn</h1>
          </div>
        </header>

        <div class="content" id="content" tabindex="-1"></div>

        <nav class="tabbar" id="tabbar" aria-label="Bottom navigation">
          <button class="tab" data-tab="home" type="button" aria-label="Home">
            <span class="tab-ic" aria-hidden="true">⌂</span>
          </button>
          <button class="tab" data-tab="scan" type="button" aria-label="Scan">
            <span class="tab-ic" aria-hidden="true">▣</span>
          </button>
          <button class="tab tab-plus" data-tab="add" type="button" aria-label="Add content">
            <span class="tab-ic" aria-hidden="true">+</span>
          </button>
          <button class="tab" data-tab="resources" type="button" aria-label="Resources">
            <span class="tab-ic" aria-hidden="true">▦</span>
          </button>
          <button class="tab" data-tab="profile" type="button" aria-label="Profile">
            <span class="tab-ic" aria-hidden="true">⦿</span>
          </button>
        </nav>

        <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

        <dialog class="sheet" id="sheet">
          <form method="dialog" class="sheet-card">
            <div class="sheet-hd">
              <div class="sheet-grip" aria-hidden="true"></div>
              <h2 id="sheetTitle">Sheet</h2>
              <button class="iconbtn" value="cancel" aria-label="Close sheet" type="submit">✕</button>
            </div>
            <div class="sheet-bd" id="sheetBody"></div>
          </form>
        </dialog>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
